{% extends "layout.html" %}
{% block content %}
<section class="panel section" style="max-width:560px; margin:40px auto;">
    <div class="badge">Admin Recovery</div>
    <h1 class="page-title" style="margin-top:12px;">Forgot Password</h1>
    <p class="page-subtitle">Enter your admin email. If it exists, a secure reset link will be sent.</p>
    <form method="post" class="stack" style="margin-top:20px;">
        <div>
            <label class="field-label">Admin Email</label>
            <input class="text-input" name="email" type="email" required>
        </div>
        <button class="primary-btn" type="submit">Send Reset Link</button>
        <a class="ghost-btn" href="{{ url_for('admin_auth.login') }}">Back to Admin Login</a>
    </form>
</section>
{% endblock %}
