{% extends "layout.html" %}

{% block content %}
<section class="panel section">
    <h1 class="page-title">Logs / Monitoring</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Action</th>
                    <th>Target Type</th>
                    <th>Target ID</th>
                    <th>Details</th>
                    <th>Time</th>
                </tr>
            </thead>
            <tbody>
                {% for log in logs %}
                <tr>
                    <td>{{ log.action }}</td>
                    <td>{{ log.target_type }}</td>
                    <td>{{ log.target_id }}</td>
                    <td>{{ log.details }}</td>
                    <td>{{ log.created_at }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
