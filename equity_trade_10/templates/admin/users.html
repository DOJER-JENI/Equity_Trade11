{% extends "layout.html" %}

{% block content %}
<section class="panel section">
    <h1 class="page-title">Manage Users</h1>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Username</th>
                    <th>Email</th>
                    <th>Admin</th>
                    <th>Active</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for user in users %}
                <tr>
                    <td>{{ user.username }}</td>
                    <td>{{ user.email }}</td>
                    <td>{{ "Yes" if user.is_admin else "No" }}</td>
                    <td>{{ "Yes" if user.is_active_user else "No" }}</td>
                    <td>
                        <form method="post" action="{{ url_for('admin.toggle_admin', user_id=user.id) }}">
                            <button class="ghost-btn" type="submit">Toggle Admin</button>
                        </form>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
